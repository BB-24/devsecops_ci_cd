name: DevSecOps Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: write
  security-events: write
  id-token: write   # ✅ required for cosign
  pull-requests: write

jobs:

  # -------------------------
  # CI (PR + PUSH)
  # -------------------------
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test
      - run: npm run lint
      - run: npm run build

      - name: Dependency Scan
        run: npm audit --audit-level=high

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

      # ✅ K8s Config Scan
      - name: Scan Kubernetes manifests
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: config
          scan-ref: k8s/

  # -------------------------
  # BUILD + PUSH
  # -------------------------
  build-and-push:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # ✅ FIXED login
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build image
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }} .

      # Scan image
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1

      # Push image
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}

      # -------------------------
      # 🔐 SUPPLY CHAIN SECURITY
      # -------------------------

      # SBOM
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}

      # Cosign install
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Sign image
      - name: Sign Image
        run: cosign sign --yes ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}

  # -------------------------
  # GITOPS PR (PR-based deploy)
  # -------------------------
  gitops-pr:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production   # ✅ approval gate

    steps:
      - uses: actions/checkout@v4

      # Update image tag (GitOps trigger)
      - name: Update K8s Manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}|" k8s/deployment.yaml

      - name: Create PR (GitOps)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No manifest changes to propose."
            exit 0
          fi

          BRANCH="gitops/deploy-${{ github.sha }}"
          git checkout -b "${BRANCH}"
          git add k8s/deployment.yaml
          git commit -m "chore(gitops): deploy image ${{ github.sha }}"
          git push -u origin "${BRANCH}"

          gh pr create \
            --title "Deploy ${{ github.sha }}" \
            --body "Updates \`k8s/deployment.yaml\` image tag to \`${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}\`.\n\nMerging this PR triggers the Argo CD sync workflow." \
            --base main \
            --head "${BRANCH}"