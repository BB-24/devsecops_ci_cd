name: DevSecOps Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:

  # -------------------------
  # CI (RUNS ON PR + PUSH)
  # -------------------------
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test

      - run: npm run lint

      - run: npm run build

      - name: Dependency Scan
        run: npm audit --audit-level=high

      # SECRET SCAN
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

  # -------------------------
  # BUILD & PUSH (ONLY MAIN)
  # -------------------------
  build-and-push:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t tic-tac-toe:${{ github.sha }} .

      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: tic-tac-toe:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Push Image
        run: |
          docker tag tic-tac-toe:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}

  # -------------------------
  # DEPLOY (ARGOCD TRIGGER)
  # -------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update K8s Manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/tic-tac-toe:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Deploy image ${{ github.sha }}"
          git push